        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .grid-niveles { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        
        /* Tarjetas de Niveles */
        .card { background: white; border-radius: 10px; padding: 30px; text-align: center; 
                box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.3s ease; text-decoration: none; color: inherit; }
        .card:hover { transform: translateY(-10px); border-top: 5px solid #3498db; }
        .card h2 { color: #2c3e50; margin-bottom: 10px; }
        .card span { color: #7f8c8d; font-size: 0.9rem; }
    </style>
</head>
